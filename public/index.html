<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="/src/index.css">
</head>
<body>
  <div class="containerDiv">
    <div class="historyButtonDiv"><span class="historyButton"><i class="fa-solid fa-clock-rotate-left"></i></span></div>
    <div class="historyDiv display noScrollbar">
      
    </div>
    <div class="inputDiv">
      <input id="inputElement" type="number" inputmode="numeric" placeholder="0">
      <div class="temporaryResult"></div>
    </div>

    <div class="keysContainerDiv">
      <div class="keysDiv">
        <button id="ACButton" class="operator">AC</button>
        <button id="CButton" class="operator">C</button>
        <button id="percButton" class="operator">%</button>
        <button class="operator">/</button>
      </div>

      <div class="keysDiv">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">X</button>
      </div>
        
      <div class="keysDiv">
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">—</button>
      </div>

      <div class="keysDiv">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">+</button>
      </div>

      <div class="keysDiv lastKeys">
        <button>0</button>
        <button>.</button>
        <button class="operator">=</button>
      </div>

    </div>
  </div>

  <script src="../src/index.js"></script>
</body>
</html>
